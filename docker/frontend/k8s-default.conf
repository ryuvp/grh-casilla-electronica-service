server {
    listen 80;
    server_name _;

    # Root del frontend compilado
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # 🔥 RENDIMIENTO Y CACHE
    # -------------------------------------------------------

    # Activar gzip
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf;

    # Cache agresiva para assets fingerprinted (hash en filename)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # -------------------------------------------------------
    # 🔁 SPA ROUTING
    # -------------------------------------------------------

    # Para Vue/React/Vite — si no existe el archivo, servir index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # 🛡️ SEGURIDAD
    # -------------------------------------------------------

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphones=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Desactivar tokens del servidor
    server_tokens off;

    # Limitar tamaño de peticiones (opcional)
    client_max_body_size 10M;
}
